trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

steps:

# -----------------------------------------
# 1. Checkout the Azure DevOps repo
# -----------------------------------------
- checkout: self
  displayName: "Checkout ADO Repository"

# -----------------------------------------
# 2. Install Git (Windows agent usually has it, but ensure)
# -----------------------------------------
- powershell: |
    git --version
    if ($LASTEXITCODE -ne 0) {
        Write-Host "Git not found — installing..."
        choco install git -y
    }
  displayName: "Ensure Git Installed"

# -----------------------------------------
# 3. Configure Git identity
# -----------------------------------------
- powershell: |
    git config --global user.email "ado-sync@users.noreply.github.com"
    git config --global user.name "Azure DevOps Mirror Bot"
  displayName: "Configure Git Identity"

# -----------------------------------------
# 4. Add GitHub remote (Secure PAT injection)
# -----------------------------------------
- powershell: |
    Write-Host "Adding GitHub remote..."

    # Remove existing remote if present
    git remote remove github 2>$null

    # IMPORTANT: Replace with your GitHub username + repo
    $githubUrl = "https://$(GITHUB_PAT)@github.com/troy-kapaun/win_server-installs.git"

    git remote add github $githubUrl

    git remote -v
  displayName: "Add GitHub Remote"

# -----------------------------------------
# 5. Mirror Azure DevOps → GitHub
# -----------------------------------------
- powershell: |
    Write-Host "Mirroring Azure DevOps → GitHub..."

    git fetch --all
    git push github --force --all
    git push github --force --tags

    Write-Host "✅ Mirror operation complete."
  displayName: "Mirror ADO → GitHub"