trigger: none   # Mirror should NOT trigger on commits

schedules:
- cron: "0 3 * * 1"     # Every Monday at 03:00 AM
  displayName: "Weekly GitHub Mirror Sync"
  branches:
    include:
      - main
  always: true

pool:
  vmImage: 'windows-latest'

variables:
- group: github-secrets   # Contains GITHUB_PAT

steps:

# 1. Clone Azure DevOps Repo Using System.AccessToken
- powershell: |
    Write-Host "Cloning Azure DevOps repo with full history..."

    git clone --progress `
      https://$env:SYSTEM_ACCESSTOKEN@dev.azure.com/BHE-IT-01/BHE-Nimbus%20Deployment%20Platform/_git/win_server-installs `
      repo
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  displayName: "Clone ADO repo (full history)"

# 2. Install Java (Required for BFG)
- powershell: |
    Write-Host "Installing Java (required for BFG)..."
    choco install jre8 -y
  displayName: "Install Java"

# 3. Copy local BFG JAR from repository
- powershell: |
    Write-Host "Using bundled BFG JAR from repo..."
    Copy-Item "$(Build.SourcesDirectory)\tools\bfg.jar" "bfg.jar"
  displayName: "Use Local BFG JAR"

# 4. Prepare bare repo for BFG cleaning
- powershell: |
    git clone --bare repo repo.bare
  displayName: "Create Bare Repo (for BFG)"

# 5. Run BFG to strip large blobs (>50MB)
- powershell: |
    Write-Host "Running BFG Cleanup..."
    java -jar bfg.jar --strip-blobs-bigger-than 50M repo.bare
  displayName: "BFG Cleanup"

# 6. Git GC after BFG
- powershell: |
    cd repo.bare
    git reflog expire --expire=now --all
    git gc --prune=now --aggressive
  displayName: "Garbage Collect After BFG"

# 7. Checkout clean repo
- powershell: |
    git clone repo.bare cleaned_repo
  displayName: "Checkout Cleaned Repository"

# 8. Install Git LFS & Track Large Types
- powershell: |
    choco install git-lfs -y
    git lfs install
  displayName: "Install Git LFS"

- powershell: |
    cd cleaned_repo

    git config user.email "ado-mirror@dev.azure.com"
    git config user.name "Azure DevOps Mirror Bot"

    git lfs track "*.iso"
    git lfs track "*.wim"
    git lfs track "*.esd"
    git lfs track "*.vhd"
    git lfs track "*.vhdx"
    git lfs track "*.msu"
    git lfs track "*.cab"

    git add .gitattributes

    try {
        git commit -m "Enable LFS tracking"
    }
    catch {
        Write-Host "No changes needed for LFS."
    }
  displayName: "Enable Git LFS Tracking"

# 9. Add GitHub Remote
- powershell: |
    cd cleaned_repo

    if (git remote | Select-String "^github$") {
        git remote remove github
    }

    $githubUrl = "https://$(GITHUB_PAT)@github.com/troy-kapaun/win_server-installs.git"
    git remote add github $githubUrl
    git remote -v
  displayName: "Add GitHub Remote"

# 10. Push Complete Cleaned History to GitHub
- powershell: |
    cd cleaned_repo

    Write-Host "Pushing all branches..."
    git push github --force --all

    Write-Host "Pushing tags..."
    git push github --force --tags

    Write-Host "✅ GitHub Mirror Completed Successfully"
  displayName: "Mirror to GitHub"