trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

variables:
- group: github-secrets      # Contains GITHUB_PAT

steps:

###############################################################################
# 1. Clone Azure DevOps repo using System.AccessToken (full clone)
###############################################################################
- powershell: |
    Write-Host "Cloning Azure DevOps repo with full history..."

    git clone --progress `
      https://$env:SYSTEM_ACCESSTOKEN@dev.azure.com/BHE-IT-01/BHE-Nimbus%20Deployment%20Platform/_git/win_server-installs `
      repo
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  displayName: "Clone ADO repo (full history)"

###############################################################################
# 2. Install Java (needed for BFG Repo-Cleaner)
###############################################################################
- powershell: |
    Write-Host "Installing Java (required for BFG)..."
    choco install jre8 -y
  displayName: "Install Java Runtime"

###############################################################################
# 3. Download BFG Repo Cleaner JAR
###############################################################################
- powershell: |
    Write-Host "Using local BFG JAR..."
    Copy-Item "$(Build.SourcesDirectory)\tools\bfg.jar" "bfg.jar"
  displayName: "Use Local BFG Repo Cleaner"

###############################################################################
# 4. Convert repo to a bare clone (required by BFG)
###############################################################################
- powershell: |
    Write-Host "Converting to bare clone for BFG processing..."

    cd repo
    git fetch --all
    cd ..

    git clone --bare repo repo.bare
  displayName: "Create bare clone for BFG"

###############################################################################
# 5. RUN BFG: Strip large binaries (>50MB) from history
###############################################################################
- powershell: |
    Write-Host "Running BFG to remove large files (>50MB)..."

    java -jar bfg.jar --strip-blobs-bigger-than 50M repo.bare
  displayName: "Run BFG Cleanup (>50MB)"

###############################################################################
# 6. Apply changes to bare repo and checkout clean repo
###############################################################################
- powershell: |
    cd repo.bare

    Write-Host "Applying BFG cleanup..."

    git reflog expire --expire=now --all
    git gc --prune=now --aggressive
  displayName: "Git GC After BFG"

# Re-checkout cleaned repo
- powershell: |
    Write-Host "Checking out cleaned repository..."
    git clone repo.bare cleaned_repo
  displayName: "Checkout Cleaned Repo"

###############################################################################
# 7. Enable Git LFS on cleaned repo
###############################################################################
- powershell: |
    Write-Host "Installing Git LFS..."
    choco install git-lfs -y
    git lfs install
  displayName: "Install Git LFS"

- powershell: |
    Write-Host "Configuring Git LFS tracking for large file types..."
    cd cleaned_repo

    # Set identity for the commit
    git config user.email "ado-mirror@dev.azure.com"
    git config user.name "Azure DevOps Mirror Bot"

    git lfs track "*.iso"
    git lfs track "*.wim"
    git lfs track "*.esd"
    git lfs track "*.vhd"
    git lfs track "*.vhdx"
    git lfs track "*.msu"
    git lfs track "*.cab"

    git add .gitattributes

    try {
        git commit -m "Add Git LFS tracking (post-BFG)"
        Write-Host "✅ LFS tracking committed."
    }
    catch {
        Write-Host "ℹ️ No changes to commit — likely already committed."
    }
  displayName: "Enable Git LFS Tracking"

###############################################################################
# 8. Add GitHub remote to cleaned repo
###############################################################################
- powershell: |
    cd cleaned_repo

    if (git remote | Select-String "^github$") {
        git remote remove github
    }

    $githubUrl = "https://$(GITHUB_PAT)@github.com/troy-kapaun/win_server-installs.git"
    git remote add github $githubUrl

    git remote -v
  displayName: "Add GitHub Remote"

###############################################################################
# 9. Mirror cleaned history to GitHub
###############################################################################
- powershell: |
    cd cleaned_repo

    Write-Host "Pushing cleaned repo to GitHub..."

    git push github --force --all
    git push github --force --tags

    Write-Host "✅ MIRROR COMPLETE — CLEANED WITH BFG + LFS"
  displayName: "Push Cleaned Repo to GitHub"