trigger:
  branches:
    include:
      - main

variables:
- group: github-secrets

pool:
  vmImage: 'windows-latest'

steps:

# 1. FULL clone with credentials
- checkout: self
  persistCredentials: true
  clean: true
  fetchDepth: 0          # ✅ REQUIRED for real mirroring
  displayName: "Checkout ADO Repo (Full Clone)"

# 2. Configure Git identity
- powershell: |
    git config --global user.email "ado-sync@users.noreply.github.com"
    git config --global user.name "Azure DevOps Mirror Bot"
  displayName: "Configure Git Identity"

# 3. Add GitHub remote
- powershell: |
    Write-Host "Adding GitHub remote..."

    if (git remote | Select-String "^github$") {
        git remote remove github
    }

    $githubUrl = "https://$(GITHUB_PAT)@github.com/troy-kapaun/win_server-installs.git"
    git remote add github $githubUrl

    git remote -v
  displayName: "Add GitHub Remote"

# 4. Mirror ADO → GitHub
- powershell: |
    Write-Host "Mirroring ADO → GitHub..."

    # Full history already cloned from Azure DevOps
    git push github --force --all
    git push github --force --tags

    Write-Host "✅ Mirror complete"
  displayName: "Mirror Repository"