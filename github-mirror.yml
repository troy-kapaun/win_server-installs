trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

variables:
- group: github-secrets      # Contains GITHUB_PAT

steps:

# -------------------------------------------------------------
# 1. Clone ADO Repo Using System.AccessToken
# -------------------------------------------------------------
- powershell: |
    Write-Host "Cloning Azure DevOps repo with full history..."

    try {
        git clone --progress `
          https://$env:SYSTEM_ACCESSTOKEN@dev.azure.com/BHE-IT-01/BHE-Nimbus%20Deployment%20Platform/_git/win_server-installs `
          repo
    }
    catch {
        Write-Host "❌ AUTH OR CLONE FAILED"
        throw
    }
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  displayName: "Clone ADO repo (full history)"

# -------------------------------------------------------------
# 2. Install Git LFS
# -------------------------------------------------------------
- powershell: |
    Write-Host "Installing Git LFS via Chocolatey..."
    choco install git-lfs -y
    git lfs install
  displayName: "Install Git LFS"

# -------------------------------------------------------------
# 3. Enable Git LFS tracking for large file types
# -------------------------------------------------------------
- powershell: |
    Write-Host "Configuring Git LFS tracking for image/binary formats..."
    cd repo

    git lfs track "*.iso"
    git lfs track "*.wim"
    git lfs track "*.esd"
    git lfs track "*.vhd"
    git lfs track "*.vhdx"
    git lfs track "*.msu"
    git lfs track "*.cab"

    git add .gitattributes

    try {
        git commit -m "Enable Git LFS tracking for large artifacts"
    }
    catch {
        Write-Host "No .gitattributes changes to commit."
    }
  displayName: "Enable Git LFS Tracking"

# -------------------------------------------------------------
# 4. Add GitHub remote
# -------------------------------------------------------------
- powershell: |
    cd repo

    if (git remote | Select-String "^github$") {
        git remote remove github
    }

    $githubUrl = "https://$(GITHUB_PAT)@github.com/troy-kapaun/win_server-installs.git"
    git remote add github $githubUrl

    git remote -v
  displayName: "Add GitHub Remote"

# -------------------------------------------------------------
# 5. Push branches + tags to GitHub (LFS enabled)
# -------------------------------------------------------------
- powershell: |
    cd repo

    Write-Host "Pushing branches..."
    git push github --force --all

    Write-Host "Pushing tags..."
    git push github --force --tags

    Write-Host "✅ MIRROR COMPLETE — ADO → GitHub with Git LFS"
  displayName: "Mirror ADO → GitHub"