trigger:
- main

jobs:

# ==========================================================
#  MATRIX JOB - Windows Server 2022 + 2025
# ==========================================================
- job: HardenMatrix
  displayName: "Matrix Harden ISO Builds"
  pool:
    vmImage: 'windows-latest'

  strategy:
    matrix:
      WS2022:
        VERSION: "2022"
        TIMEZONE: "CST"  # or EST, MST, PST  # or EST, MST, PST
      WS2025:
        VERSION: "2025"
        TIMEZONE: "CST"  # or EST, MST, PST

  steps:

  # Pass VERSION into environment correctly
  - powershell: echo "VERSION=$env:VERSION"
    env:
      VERSION: $(VERSION)
    displayName: "Expose VERSION"

  - checkout: self
    displayName: "Checkout Repo"

  - powershell: |
      ./ISO_Builds/scripts/Validate-Repo.ps1
    displayName: "Validate Repo"

  - powershell: |
      $ErrorActionPreference = 'Stop'
      $dest = 'C:\ADKTools\Oscdimg'
      New-Item $dest -ItemType Directory -Force | Out-Null

      Write-Host "Downloading ADK Oscdimg tools from Azure Artifacts..."
      az artifacts universal download `
        --organization $(System.CollectionUri) `
        --project "$(System.TeamProject)" `
        --scope project `
        --feed win-server-isos `
        --name adk-oscdimg-tools `
        --version '*' `
        --path $dest

      Write-Host "ADK tools downloaded:"
      Get-ChildItem $dest | Format-Table Name, Length -AutoSize

      # Verify oscdimg.exe is present
      if (!(Test-Path "$dest\oscdimg.exe")) {
        throw "oscdimg.exe not found after download"
      }
      Write-Host "[OK] oscdimg.exe ready at $dest\oscdimg.exe"
    displayName: "Download ADK Tools"
    env:
      AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)

  - powershell: |
      if (Test-Path 'C:\WIMBUILD') { Remove-Item 'C:\WIMBUILD' -Recurse -Force }
      New-Item 'C:\WIMBUILD' -ItemType Directory | Out-Null
      Copy-Item "$(Build.SourcesDirectory)\ISO_Builds\*" 'C:\WIMBUILD' -Recurse -Force
    displayName: "Prepare Workdir"

  - powershell: |
      $ErrorActionPreference = 'Stop'
      $version = $env:VERSION
      $feed = 'win-server-isos'
      $pkg = "windows-server-iso-$version"
      $dest = 'C:\WIMBUILD\iso'

      New-Item $dest -ItemType Directory -Force | Out-Null

      Write-Host "Downloading $pkg from Azure Artifacts..."
      az artifacts universal download `
        --organization $(System.CollectionUri) `
        --project "$(System.TeamProject)" `
        --scope project `
        --feed $feed `
        --name $pkg `
        --version '*' `
        --path $dest

      if ($LASTEXITCODE -ne 0) {
        throw "Failed to download $pkg from feed '$feed'"
      }

      # Verify an ISO file was actually downloaded
      $isoFile = Get-ChildItem $dest -Filter '*.iso' | Select-Object -First 1
      if (!$isoFile) {
        throw "No .iso file found in $dest after download"
      }
      Write-Host "[OK] Downloaded: $($isoFile.Name) ($([math]::Round($isoFile.Length/1GB,2)) GB)"
    displayName: "Download ISO"
    env:
      AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
      VERSION: $(VERSION)

  - powershell: |
      $ErrorActionPreference = 'Stop'
      $dest = 'C:\WIMBUILD\unattend'
      New-Item $dest -ItemType Directory -Force | Out-Null

      Write-Host "Downloading Sysprep unattend files from Azure Artifacts..."
      az artifacts universal download `
        --organization $(System.CollectionUri) `
        --project "$(System.TeamProject)" `
        --scope project `
        --feed win-server-isos `
        --name sysprep-unattend `
        --version '*' `
        --path $dest

      Write-Host "Unattend files downloaded:"
      Get-ChildItem $dest | Format-Table Name, Length -AutoSize
    displayName: "Download Unattend Files"
    env:
      AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)

  - powershell: |
      $version = $env:VERSION
      $tz = $env:TIMEZONE
      $iso = (Get-ChildItem 'C:\WIMBUILD\iso' -Filter '*.iso' | Select-Object -First 1).FullName
      if (!$iso) {
        throw "No .iso file found in C:\WIMBUILD\iso"
      }
      $updates = "C:\WIMBUILD\updates\$version"
      $outiso = "C:\WIMBUILD\Hardened${version}_$tz.iso"

      Write-Host "Timezone: $tz"
      Set-Location 'C:\WIMBUILD\scripts'
      ./Harden-WIM.ps1 -IsoPath $iso -UpdatesPath $updates -GpoPath 'C:\WIMBUILD\gpo' -OutputIso $outiso -Timezone $tz -UnattendPath 'C:\WIMBUILD\unattend'
    displayName: "Harden Image"
    env:
      VERSION: $(VERSION)
      TIMEZONE: $(TIMEZONE)

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: "C:\\WIMBUILD\\Hardened$(VERSION)_$(TIMEZONE).iso"
      ArtifactName: "Hardened-$(VERSION)-$(TIMEZONE)"
    env:
      VERSION: $(VERSION)
      TIMEZONE: $(TIMEZONE)
    displayName: "Publish ISO"


# ==========================================================
#  OPTIONAL MIRROR JOB
# ==========================================================
- job: MirrorJob
  dependsOn: HardenMatrix
  condition: eq(variables['runGithubMirror'], 'true')
  pool:
    vmImage: 'windows-latest'

  steps:
  - powershell: |
      Write-Host "Triggering GitHub Mirror..."
      ./github-mirror.yml
    displayName: "Run GitHub Mirror"

# ==========================================================
#  THIRD TUESDAY MONTHLY SCHEDULE
# ==========================================================
schedules:
- cron: "0 3 15-21 * 2"
  displayName: "Third Tuesday Monthly Build"
  branches:
    include:
      - main
  always: true