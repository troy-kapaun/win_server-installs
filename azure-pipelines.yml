trigger:
- main

jobs:

# ==========================================================
#  MATRIX JOB - Windows Server 2022 + 2025
# ==========================================================
- job: HardenMatrix
  displayName: "Matrix Harden ISO Builds"
  pool:
    vmImage: 'windows-latest'

  strategy:
    matrix:
      WS2022:
        VERSION: "2022"
      WS2025:
        VERSION: "2025"

  steps:

  # Pass VERSION into environment correctly
  - powershell: echo "VERSION=$env:VERSION"
    env:
      VERSION: $(VERSION)
    displayName: "Expose VERSION"

  - checkout: self
    displayName: "Checkout Repo"

  - powershell: |
      ./ISO_Builds/scripts/Validate-Repo.ps1
    displayName: "Validate Repo"

  - task: Cache@2
    inputs:
      key: 'win-adk'
      path: 'C:\ADKCache'
    displayName: "Cache ADK"

  - powershell: |
      $ErrorActionPreference = 'Stop'
      New-Item -ItemType Directory -Force -Path 'C:\ADKCache' | Out-Null

      # Force TLS 1.2 - required for Microsoft download endpoints on PS 5.1
      [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

      if (!(Test-Path 'C:\ADKCache\done.flag')) {
        # Download the ADK online installer (UseBasicParsing required on Server Core)
        Write-Host "Downloading ADK installer..."
        Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/?linkid=2247041' `
          -OutFile 'C:\ADKCache\adksetup.exe' -UseBasicParsing

        # Validate the download is a real PE executable
        $file = Get-Item 'C:\ADKCache\adksetup.exe'
        if ($file.Length -lt 1MB) {
          throw "adksetup.exe is only $($file.Length) bytes - download likely failed"
        }
        $header = [System.IO.File]::ReadAllBytes($file.FullName)[0..1]
        if ($header[0] -ne 0x4D -or $header[1] -ne 0x5A) {
          throw "adksetup.exe is not a valid PE executable (missing MZ header)"
        }

        # Use /layout to download the full offline payload
        Write-Host "Downloading ADK offline layout..."
        $layout = Start-Process 'C:\ADKCache\adksetup.exe' `
          -ArgumentList '/quiet /layout C:\ADKCache\layout' `
          -Wait -PassThru
        if ($layout.ExitCode -ne 0) {
          throw "ADK layout download failed with exit code $($layout.ExitCode)"
        }

        # Install from the offline layout
        Write-Host "Installing Deployment Tools from offline layout..."
        $install = Start-Process 'C:\ADKCache\layout\adksetup.exe' `
          -ArgumentList '/quiet /norestart /features OptionId.DeploymentTools' `
          -Wait -PassThru
        if ($install.ExitCode -ne 0) {
          throw "ADK install failed with exit code $($install.ExitCode)"
        }

        New-Item -ItemType File -Path 'C:\ADKCache\done.flag' | Out-Null
        Write-Host "ADK installed successfully."
      } else {
        Write-Host "ADK already cached - installing from offline layout..."
        $install = Start-Process 'C:\ADKCache\layout\adksetup.exe' `
          -ArgumentList '/quiet /norestart /features OptionId.DeploymentTools' `
          -Wait -PassThru
        if ($install.ExitCode -ne 0) {
          throw "ADK install failed with exit code $($install.ExitCode)"
        }
        Write-Host "ADK installed from cache."
      }
    displayName: "Install ADK"

  - powershell: |
      if (Test-Path 'C:\WIMBUILD') { Remove-Item 'C:\WIMBUILD' -Recurse -Force }
      New-Item 'C:\WIMBUILD' -ItemType Directory | Out-Null
      Copy-Item "$(Build.SourcesDirectory)\ISO_Builds\*" 'C:\WIMBUILD' -Recurse -Force
    displayName: "Prepare Workdir"

  - powershell: |
      $version = $env:VERSION
      $feed = 'win-server-isos'
      $pkg = "windows-server-iso-$version"
      $dest = 'C:\WIMBUILD\iso'

      New-Item $dest -ItemType Directory -Force | Out-Null

      az artifacts universal download `
        --feed $feed `
        --name $pkg `
        --version '*' `
        --path $dest

      Write-Host "Downloaded ISO:"
      Get-ChildItem $dest
    displayName: "Download ISO"
    env:
      VERSION: $(VERSION)

  - powershell: |
      $version = $env:VERSION
      $iso = (Get-ChildItem 'C:\WIMBUILD\iso').FullName
      $updates = "C:\WIMBUILD\updates\$version"
      $outiso = "C:\WIMBUILD\Hardened$version.iso"

      Set-Location 'C:\WIMBUILD\scripts'
      ./Harden-WIM.ps1 -IsoPath $iso -UpdatesPath $updates -GpoPath 'C:\WIMBUILD\gpo' -OutputIso $outiso
    displayName: "Harden Image"
    env:
      VERSION: $(VERSION)

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: "C:\\WIMBUILD\\Hardened$(VERSION).iso"
      ArtifactName: "Hardened-$(VERSION)"
    env:
      VERSION: $(VERSION)
    displayName: "Publish ISO"


# ==========================================================
#  OPTIONAL MIRROR JOB
# ==========================================================
- job: MirrorJob
  dependsOn: HardenMatrix
  condition: eq(variables['runGithubMirror'], 'true')
  pool:
    vmImage: 'windows-latest'

  steps:
  - powershell: |
      Write-Host "Triggering GitHub Mirror..."
      ./github-mirror.yml
    displayName: "Run GitHub Mirror"

# ==========================================================
#  THIRD TUESDAY MONTHLY SCHEDULE
# ==========================================================
schedules:
- cron: "0 3 15-21 * 2"
  displayName: "Third Tuesday Monthly Build"
  branches:
    include:
      - main
  always: true